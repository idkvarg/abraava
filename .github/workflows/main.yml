name: Telegram/Bale Bot and DB Backup

on:
  schedule:
    # اجرای خودکار ربات هر 6 ساعت (برای اینکه همیشه آنلاین بماند)
    - cron: '0 */6 * * *'
  workflow_dispatch: # امکان اجرای دستی اکشن

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install balethon yt-dlp

      - name: Run Bot (Timeout after 5.5 hours)
        env:
          # فراخوانی سکرت‌هایی که در تنظیمات گیت‌هاب ذخیره کرده‌اید
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          DB_CHANNEL_ID: ${{ secrets.DB_CHANNEL_ID }}
        run: |
          # متوقف کردن ربات بعد از 5.5 ساعت برای جلوگیری از تایم‌اوت شدن خود اکشن 
          # تا مرحله بعد (کامیت دیتابیس) با موفقیت اجرا شود.
          timeout 5.5h python bot.py || true

      - name: Commit and Push DB Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add archive.db
          # اگر تغییری در دیتابیس وجود داشت، آن را کامیت کن
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-backup: Update SQLite DB"
          git push
