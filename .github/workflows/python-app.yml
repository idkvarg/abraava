name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: python-application-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache ffmpeg (apt packages)
      uses: actions/cache@v4
      # caching system APT packages is limited. We cache /var/cache/apt/archives to avoid re-downloading .deb files.
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('**/apt-packages.txt') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install ffmpeg and other apt packages
      run: |
        sudo apt-get update
        # Optional: list additional apt packages in apt-packages.txt for cache invalidation when changed.
        # Install ffmpeg (will use cached .deb files from /var/cache/apt/archives when available)
        sudo apt-get install -y ffmpeg
      shell: bash

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run main.py
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: python main.py
