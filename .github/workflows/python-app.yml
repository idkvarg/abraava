name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: python-application-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    # Restore pip cache before installing dependencies so installs prefer cached wheels/packages
    - name: Cache pip
      uses: actions/cache@v4
      id: pip-cache
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # Restore APT .deb cache before running apt-get so apt can reuse cached .deb files
    - name: Cache apt archives
      uses: actions/cache@v4
      id: apt-cache
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('**/apt-packages.txt') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install ffmpeg and other apt packages (uses cached .deb when available)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
      shell: bash

    - name: Install dependencies (uses pip cache)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Save caches again (actions/cache saves automatically at job end when key is set,
    # but explicitly updating caches is not required here). Continue to run code.
    - name: Run main.py
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: python main.py
